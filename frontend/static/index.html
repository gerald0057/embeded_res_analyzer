<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嵌入式资源分析工具 - 原型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }
        
        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .data-display {
            background: #e8f4fd;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-family: monospace;
            text-align: left;
            overflow-x: auto;
        }
        
        .loading {
            display: none;
            color: #667eea;
            margin: 10px 0;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 嵌入式资源分析工具</h1>
        <p class="subtitle">阶段0 - 架构验证原型</p>
        
        <div class="status-card">
            <h3>系统状态</h3>
            <div class="status-item">
                <span>前端页面:</span>
                <span id="frontend-status" style="color: green;">✅ 已加载</span>
            </div>
            <div class="status-item">
                <span>后端API:</span>
                <span id="api-status">待测试...</span>
            </div>
            <div class="status-item">
                <span>架构验证:</span>
                <span id="architecture-status">进行中...</span>
            </div>
        </div>
        
        <div>
            <button class="btn" onclick="testHealthCheck()">测试健康检查</button>
            <button class="btn" onclick="testAPI()">测试API端点</button>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>请求中...
        </div>
        
        <div id="data-display" class="data-display" style="display: none;">
            <!-- API响应数据将显示在这里 -->
        </div>
        
        <div style="margin-top: 30px; color: #666; font-size: 0.9em;">
            <p>技术栈验证：FastAPI + 纯HTML/JS + 本地部署</p>
            <p>下一步：实现核心资源分析引擎</p>
        </div>
    </div>

    <script>
        // API基础URL
        const API_BASE = window.location.origin;
        
        async function testHealthCheck() {
            showLoading();
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                const data = await response.json();
                
                document.getElementById('api-status').innerHTML = 
                    `✅ ${data.status} (v${data.version})`;
                document.getElementById('api-status').style.color = 'green';
                
                showData('健康检查响应:', data);
            } catch (error) {
                document.getElementById('api-status').innerHTML = 
                    '❌ 连接失败';
                document.getElementById('api-status').style.color = 'red';
                showData('错误:', error.message);
            }
            hideLoading();
        }
        
        async function testAPI() {
            showLoading();
            try {
                const response = await fetch(`${API_BASE}/api/test`);
                const data = await response.json();
                
                document.getElementById('architecture-status').innerHTML = 
                    '✅ 前后端通信正常';
                document.getElementById('architecture-status').style.color = 'green';
                
                showData('测试API响应:', data);
            } catch (error) {
                document.getElementById('architecture-status').innerHTML = 
                    '❌ 通信异常';
                document.getElementById('architecture-status').style.color = 'red';
                showData('错误:', error.message);
            }
            hideLoading();
        }
        
        function showData(title, data) {
            const display = document.getElementById('data-display');
            display.innerHTML = `
                <strong>${title}</strong><br>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
            display.style.display = 'block';
        }
        
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('data-display').style.display = 'none';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        // 页面加载时自动测试健康检查
        window.addEventListener('load', () => {
            setTimeout(testHealthCheck, 500);
        });
    </script>
</body>
</html>
